<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- ===================================================================
       DOSBTS app icon — eiDotter yolk, restated as a 3-cellular CGM sensor.

       Direct line from the eiDotter V2 Logo (src/components/Brand/Logo.tsx):
         <circle cx="16" cy="16" r="11"  fill="#FFB000" />   sensor body
         <circle cx="12" cy="12" r="3.2" fill="#FFD97A" />   dome
         <circle cx="11" cy="11" r="1.1" fill="#FFE8A8" />   specular

       Yolk-to-sensor transform:
         - off-centre highlight → concentric rings (sensor geometry)
         - 3 layers stay (brand-locked structure)
         - 3 faint transmission arcs read as wireless/cellular without
           adding a 4th element
         - phosphor glow from Logo's `glow` prop kept as a radial sheen

       Palette hexes match eiDotter brand tokens verbatim.
       ===================================================================
  -->

  <defs>
    <!-- Phosphor glow (eiDotter's `glow` prop, upscaled for 1024px) -->
    <filter id="phosphor" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Faint CRT scanlines — matches DOSTypography treatment -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0,0,0,0.08)"/>
    </pattern>

    <!-- Radial sheen on the sensor body — mimics the yolk's soft gradient -->
    <radialGradient id="bodyFill" cx="45%" cy="42%" r="60%">
      <stop offset="0%"  stop-color="#FFD97A"/>
      <stop offset="55%" stop-color="#FFB000"/>
      <stop offset="100%" stop-color="#9A5700"/>
    </radialGradient>
  </defs>

  <!-- Black CGA background -->
  <rect width="1024" height="1024" fill="#000000"/>

  <!-- Transmission arcs — cellular hint, drawn behind the sensor body so they
       read as emissions radiating outward. Three arcs = "three-cellular". -->
  <g fill="none" stroke="#FFB000" stroke-linecap="round" opacity="0.28">
    <!-- 10 o'clock direction — upper left quadrant only -->
    <path d="M 240,320 A 400,400 0 0 1 320,240" stroke-width="14"/>
    <path d="M 180,300 A 480,480 0 0 1 300,180" stroke-width="10" opacity="0.7"/>
    <path d="M 120,280 A 560,560 0 0 1 280,120" stroke-width="6"  opacity="0.45"/>
  </g>

  <g filter="url(#phosphor)">
    <!-- Layer 1 — sensor body (maps to yolk outer disc, r=11 in 32px = ~352 in 1024px) -->
    <circle cx="512" cy="512" r="352" fill="url(#bodyFill)"/>

    <!-- Layer 1b — body edge, thin darker ring for definition against scanlines -->
    <circle cx="512" cy="512" r="352" fill="none" stroke="#9A5700" stroke-width="6"/>

    <!-- Layer 2 — active-scan ring (maps to yolk highlight, r=3.2 in 32 = 102 in 1024).
         Concentric instead of offset — that's the "sensor" tell. -->
    <circle cx="512" cy="512" r="188" fill="none" stroke="#FFD97A" stroke-width="20"/>

    <!-- Layer 3 — central filament dome (maps to yolk specular, r=1.1 in 32 = 35 in 1024).
         Brightest point, small enough to read as "exit point". -->
    <circle cx="512" cy="512" r="52" fill="#FFE8A8"/>

    <!-- Inner dome highlight — suggests curvature on the filament exit -->
    <circle cx="498" cy="498" r="18" fill="#FFFFFF" opacity="0.55"/>
  </g>

  <!-- Four tick marks at cardinal points on the active-scan ring — subtle
       sensor-grid cue, reads as filament contact points. -->
  <g stroke="#FFB000" stroke-width="6" stroke-linecap="round" opacity="0.85">
    <line x1="512" y1="296" x2="512" y2="316"/>
    <line x1="512" y1="708" x2="512" y2="728"/>
    <line x1="296" y1="512" x2="316" y2="512"/>
    <line x1="708" y1="512" x2="728" y2="512"/>
  </g>

  <!-- Scanline overlay -->
  <rect width="1024" height="1024" fill="url(#scanlines)"/>
</svg>
