<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" style="display:block;width:100%;height:auto;max-width:1000px;font-family:'SF Mono',Menlo,monospace;background:#000">
  <defs>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffb000"/>
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a5700"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#55ffff"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="28" text-anchor="middle" fill="#ffb000" font-size="16" font-weight="bold">DOSBTS · OBJECT MAP</text>
  <text x="500" y="46" text-anchor="middle" fill="#9a5700" font-size="10">DMNC-795 · 3 entry + 8 read/monitoring · Pattern assignments</text>

  <!-- Legend -->
  <g>
    <rect x="30" y="60" width="210" height="132" fill="#000" stroke="#333" stroke-width="1"/>
    <text x="135" y="78" text-anchor="middle" fill="#ffb000" font-size="11" font-weight="bold">LEGEND</text>
    <rect x="42" y="88" width="14" height="14" stroke="#ffb000" fill="none" stroke-width="2"/>
    <text x="62" y="100" fill="#ccc" font-size="10">entry object [Pattern]</text>
    <rect x="42" y="108" width="14" height="14" stroke="#55ffff" fill="none" stroke-width="2"/>
    <text x="62" y="120" fill="#ccc" font-size="10">central data spine</text>
    <rect x="42" y="128" width="14" height="14" stroke="#9a5700" fill="none" stroke-width="1"/>
    <text x="62" y="140" fill="#ccc" font-size="10">read / monitoring</text>
    <rect x="42" y="148" width="14" height="14" stroke="#9a5700" fill="none" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="62" y="160" fill="#ccc" font-size="10">meta / HK-imported</text>
    <line x1="42" y1="178" x2="62" y2="178" stroke="#ffb000" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
    <text x="68" y="182" fill="#ccc" font-size="10">entry → GR (primary)</text>
  </g>

  <!-- Sensor -->
  <g>
    <rect x="430" y="70" width="140" height="50" stroke="#9a5700" fill="#000" stroke-width="1"/>
    <text x="500" y="92" text-anchor="middle" fill="#9a5700" font-size="12" font-weight="bold">SENSOR</text>
    <text x="500" y="108" text-anchor="middle" fill="#666" font-size="9">BLE/NFC · paired→active→expired</text>
  </g>
  <line x1="500" y1="120" x2="500" y2="218" stroke="#55ffff" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="510" y="172" fill="#55ffff" font-size="10">source</text>

  <!-- GlucoseReading (central spine) -->
  <g>
    <rect x="330" y="220" width="340" height="70" stroke="#55ffff" fill="#000" stroke-width="2"/>
    <text x="500" y="244" text-anchor="middle" fill="#55ffff" font-size="14" font-weight="bold">GLUCOSE READING</text>
    <text x="500" y="260" text-anchor="middle" fill="#888" font-size="9">value · timestamp · trend · minuteChange</text>
    <text x="500" y="276" text-anchor="middle" fill="#888" font-size="9">central data spine — every object relates here</text>
  </g>

  <!-- Favourite -->
  <g>
    <rect x="50" y="220" width="150" height="56" stroke="#9a5700" fill="#000" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="125" y="242" text-anchor="middle" fill="#9a5700" font-size="12" font-weight="bold">FAVOURITE</text>
    <text x="125" y="258" text-anchor="middle" fill="#666" font-size="9">template for Meal</text>
    <text x="125" y="270" text-anchor="middle" fill="#666" font-size="9">1-tap · long-press→edit</text>
  </g>

  <!-- Exercise -->
  <g>
    <rect x="800" y="220" width="150" height="56" stroke="#9a5700" fill="#000" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="875" y="242" text-anchor="middle" fill="#9a5700" font-size="12" font-weight="bold">EXERCISE</text>
    <text x="875" y="258" text-anchor="middle" fill="#666" font-size="9">HealthKit-imported · read</text>
    <text x="875" y="270" text-anchor="middle" fill="#666" font-size="9">Meal impact confounder</text>
  </g>

  <!-- Meal (entry left) -->
  <g>
    <rect x="50" y="340" width="200" height="108" stroke="#ffb000" fill="#000" stroke-width="2"/>
    <text x="150" y="362" text-anchor="middle" fill="#ffb000" font-size="13" font-weight="bold">MEAL</text>
    <text x="150" y="378" text-anchor="middle" fill="#ccc" font-size="9">desc · carbs · time · sessionId</text>
    <text x="150" y="392" text-anchor="middle" fill="#888" font-size="9">photo / barcode / text / manual / fav</text>
    <rect x="75" y="408" width="150" height="24" fill="#ffb000" fill-opacity="0.18" stroke="#ffb000" stroke-width="1"/>
    <text x="150" y="424" text-anchor="middle" fill="#ffb000" font-size="10" font-weight="bold">Pattern 1 · StagingPlate</text>
  </g>

  <!-- InsulinDelivery (entry right) -->
  <g>
    <rect x="750" y="340" width="200" height="108" stroke="#ffb000" fill="#000" stroke-width="2"/>
    <text x="850" y="362" text-anchor="middle" fill="#ffb000" font-size="13" font-weight="bold">INSULIN DELIVERY</text>
    <text x="850" y="378" text-anchor="middle" fill="#ccc" font-size="9">units · type · starts · ends</text>
    <text x="850" y="392" text-anchor="middle" fill="#888" font-size="9">meal / snack / corr / basal</text>
    <rect x="775" y="408" width="150" height="24" fill="#ffb000" fill-opacity="0.18" stroke="#ffb000" stroke-width="1"/>
    <text x="850" y="424" text-anchor="middle" fill="#ffb000" font-size="10" font-weight="bold">Pattern 2 · CategoryPanel</text>
  </g>

  <!-- BloodGlucose (entry bottom-left) -->
  <g>
    <rect x="50" y="490" width="200" height="90" stroke="#ffb000" fill="#000" stroke-width="2"/>
    <text x="150" y="512" text-anchor="middle" fill="#ffb000" font-size="13" font-weight="bold">BLOOD GLUCOSE</text>
    <text x="150" y="528" text-anchor="middle" fill="#ccc" font-size="9">value · time</text>
    <rect x="75" y="540" width="150" height="24" fill="none" stroke="#9a5700" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="150" y="556" text-anchor="middle" fill="#9a5700" font-size="10">direct entry · no pattern</text>
  </g>

  <!-- Alarm -->
  <g>
    <rect x="750" y="490" width="200" height="56" stroke="#9a5700" fill="#000" stroke-width="1"/>
    <text x="850" y="512" text-anchor="middle" fill="#9a5700" font-size="12" font-weight="bold">ALARM</text>
    <text x="850" y="528" text-anchor="middle" fill="#666" font-size="9">low/high/predictive · snooze</text>
    <text x="850" y="540" text-anchor="middle" fill="#666" font-size="9">← thresholds from Goal/limit</text>
  </g>

  <!-- TreatmentCycle -->
  <g>
    <rect x="750" y="590" width="200" height="58" stroke="#9a5700" fill="#000" stroke-width="1"/>
    <text x="850" y="612" text-anchor="middle" fill="#9a5700" font-size="12" font-weight="bold">TREATMENT CYCLE</text>
    <text x="850" y="626" text-anchor="middle" fill="#666" font-size="9">Rule-of-15 · countdown</text>
    <text x="850" y="638" text-anchor="middle" fill="#666" font-size="9">→ GR recheck · → Meal hypo</text>
  </g>

  <!-- DailyDigest -->
  <g>
    <rect x="320" y="600" width="360" height="56" stroke="#55ff55" fill="#000" stroke-width="1"/>
    <text x="500" y="622" text-anchor="middle" fill="#55ff55" font-size="12" font-weight="bold">DAILY DIGEST</text>
    <text x="500" y="636" text-anchor="middle" fill="#666" font-size="9">stats + AI insight (Claude Haiku)</text>
    <text x="500" y="648" text-anchor="middle" fill="#666" font-size="9">aggregates GR + Meal + Insulin + BG + Exercise</text>
  </g>

  <!-- Goal/limit -->
  <g>
    <rect x="50" y="600" width="200" height="56" stroke="#9a5700" fill="#000" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="150" y="622" text-anchor="middle" fill="#9a5700" font-size="12" font-weight="bold">GOAL / LIMIT</text>
    <text x="150" y="636" text-anchor="middle" fill="#666" font-size="9">alarmLow · alarmHigh · target</text>
    <text x="150" y="648" text-anchor="middle" fill="#666" font-size="9">→ Alarm · chart · TIR</text>
  </g>

  <!-- ARROWS -->
  <!-- Favourite → Meal -->
  <line x1="125" y1="276" x2="125" y2="338" stroke="#9a5700" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowDim)"/>
  <text x="132" y="310" fill="#9a5700" font-size="9">template</text>

  <!-- Meal → GR (impact) -->
  <path d="M 250 370 Q 300 310 330 260" stroke="#ffb000" stroke-width="2" fill="none" marker-end="url(#arrowAmber)"/>
  <text x="265" y="308" fill="#ffb000" font-size="10" font-weight="bold">impact</text>

  <!-- Insulin → GR (IOB) -->
  <path d="M 750 370 Q 700 310 670 260" stroke="#ffb000" stroke-width="2" fill="none" marker-end="url(#arrowAmber)"/>
  <text x="730" y="308" text-anchor="end" fill="#ffb000" font-size="10" font-weight="bold">IOB</text>

  <!-- BG → GR (calibration) -->
  <path d="M 250 520 Q 310 400 340 290" stroke="#ffb000" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowAmber)"/>
  <text x="305" y="430" fill="#ffb000" font-size="10">calib.</text>

  <!-- Meal ↔ Insulin (bolus pairing) -->
  <line x1="250" y1="418" x2="750" y2="418" stroke="#9a5700" stroke-width="1" stroke-dasharray="4,3" marker-start="url(#arrowDim)" marker-end="url(#arrowDim)"/>
  <text x="500" y="412" text-anchor="middle" fill="#9a5700" font-size="10">bolus pairing / confounder</text>

  <!-- Exercise → GR -->
  <line x1="800" y1="248" x2="672" y2="248" stroke="#9a5700" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowDim)"/>

  <!-- GR → Alarm -->
  <path d="M 660 290 Q 720 400 780 488" stroke="#9a5700" stroke-width="1" fill="none" marker-end="url(#arrowDim)"/>
  <text x="745" y="400" text-anchor="end" fill="#9a5700" font-size="9">eval</text>

  <!-- Alarm → TreatmentCycle -->
  <line x1="850" y1="548" x2="850" y2="588" stroke="#9a5700" stroke-width="1" marker-end="url(#arrowDim)"/>
  <text x="858" y="573" fill="#9a5700" font-size="9">trigger</text>

  <!-- TreatmentCycle → GR (recheck) -->
  <path d="M 800 618 Q 600 500 560 290" stroke="#9a5700" stroke-width="1" fill="none" stroke-dasharray="3,3" marker-end="url(#arrowDim)"/>
  <text x="615" y="475" fill="#9a5700" font-size="9">recheck</text>

  <!-- Entries → DailyDigest (dotted fan-in, thin) -->
  <path d="M 150 448 Q 250 560 330 620" stroke="#55ff55" stroke-width="0.8" stroke-dasharray="2,3" fill="none" marker-end="url(#arrowDim)" opacity="0.6"/>
  <path d="M 850 448 Q 760 560 670 620" stroke="#55ff55" stroke-width="0.8" stroke-dasharray="2,3" fill="none" marker-end="url(#arrowDim)" opacity="0.6"/>
  <path d="M 250 540 L 330 615" stroke="#55ff55" stroke-width="0.8" stroke-dasharray="2,3" fill="none" marker-end="url(#arrowDim)" opacity="0.6"/>
  <path d="M 500 290 L 500 598" stroke="#55ff55" stroke-width="0.8" stroke-dasharray="2,3" fill="none" marker-end="url(#arrowDim)" opacity="0.6"/>
</svg>
